name: Peringatan Cuaca Tim Teknik - Kurik Merauke

on:
  schedule:
    # 06:00 WIT = 21:00 UTC hari sebelumnya (WIT = UTC+9)
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # tombol "Run workflow" manual di tab Actions, untuk uji coba

jobs:
  kirim-peringatan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Debug cek secret (aman, tidak membocorkan nilai)
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WAG_TARGET: ${{ secrets.WAG_TARGET }}
        run: |
          if [ -z "$FONNTE_TOKEN" ]; then
            echo "FONNTE_TOKEN: KOSONG / tidak terbaca"
          else
            echo "FONNTE_TOKEN: ADA, panjang ${#FONNTE_TOKEN} karakter"
          fi
          if [ -z "$WAG_TARGET" ]; then
            echo "WAG_TARGET: KOSONG / tidak terbaca"
          else
            echo "WAG_TARGET: ADA, panjang ${#WAG_TARGET} karakter"
          fi
          
      - name: Kirim peringatan cuaca ke WAG
        env:
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WAG_TARGET: ${{ secrets.WAG_TARGET }}
          BMKG_ADM4: "93.01.11.2002"
        run: python scripts/send_fonnte_alert.py
